<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../ytplayer/ytplayer.css">
    <!--script src="../videoModal.js" defer></script-->
    <script src="../ytplayer/youTubePlayer.js" defer></script>
    <script src="../commonCode.js" defer></script>

</head>
<body>
    <button class="button" onclick="goBack()">&lt; Back</button>
    <button class="button" onclick="location.href='../index.html'">⌂ Home</button>
    <h1>Welcome to SK!</h1>
    <div id="codeDisplay" data-kid="kid1" style="font-size: 24px; margin-top: 20px; color: #333;">Progress: </div>
    <h1>Your homework:</h1>

    <!-- Modal Setup -->
    <div id="iframeModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000;">
        <iframe id="iframeContent" src="" style="width:100%; height:100%; border:0;"></iframe>
    </div>

    <div class="div-container">
     <button class="button required task-button" data-reveal-code="true" data-target-page="../genericGame/genericGame.html?jsonFile=../skFrenchGame/frenchData.json&title=French Game&useAudioFiles=true&useTTS=false">French Game</button>
        <button class="button required task-button" data-reveal-code="true" data-target-page="../genericGame/genericGame.html?jsonFile=../heggerty/skSpellingData.json&title=Spelling Game&useAudioFiles=true&useTTS=true">Spelling Game</button>
        <button class="button required task-button" data-reveal-code="true" data-target-page="../genericGame/genericGame.html?jsonFile=../heggerty/skLetterSounds.json&title=Letter Sound Game&useAudioFiles=true&useTTS=false">Letter Sound Game</button>
        <button class="button required task-button" data-reveal-code="true" data-target-page="../genericGame/genericGame.html?jsonFile=../heggerty/skSpellingData.json&title=Sound Parts Game&useAudioFiles=true&useTTS=true">Sound Parts Game</button>
        <button class="button required task-button" data-reveal-code="true" data-target-page="../genericGame/genericGame.html?jsonFile=../skSightWordGame/sightWord.json&title=Sight Word Game&useAudioFiles=false&useTTS=true">Sight Word Game</button>
        
        <!--button class="button" onclick="location.href='../readAlongGame/readalong-game.html'">Read Along Game</button-->
        <button class="button required"  data-reveal-code="true" onclick="openNewWindow('https://readalong.google.com')">Google Read Along</button>
        <button class="button required day-friday"  data-reveal-code="true" onclick="openNewWindow('https://classroom.google.com/c/NTI0MDY0MjM3OTg5')">Google Classroom</button>
    </div>

    <div class="video div-container">
        <!-- Video Modal -->
        <button class="button required video-button" data-reveal-code="true" data-json-file="../heggertyVideos.json" data-selection-mode="sequential">Heggerty Video</button>
        <button class="button required video-button" data-reveal-code="true" data-json-file="../frenchBookVideoLinks.json" data-selection-mode="sequential">Random French Book</button>
        <button class="button required video-button" data-reveal-code="true" data-json-file="../noviceKungFuVideos.json" data-selection-mode="sequential">Random Novice Kungfu</button>     
        <button class="button required video-button" data-reveal-code="true" data-json-file="../noviceKungFuVideos.json" data-selection-mode="exact">SingleStepForm</button>
    </div>
 
 
    <div id="homework" class="div-container">
        <ul id="checklist">
            <li class="weekday-only">
                <input type="checkbox" class="chore-checkbox" data-reveal-code="true" id="item0">
                <span class="chore-text" onclick="readText('English printing')">English printing 🔊</span>
            </li>
            <li class="weekday-only">
                <input type="checkbox" class="chore-checkbox" data-reveal-code="true" id="item1">
                <span class="chore-text" onclick="readText('Read english book to parent')">Read english book 🔊</span>
            </li>
            <li class="weekday-only">
                <input type="checkbox" class="chore-checkbox" data-reveal-code="true"id="item2">
                <span class="chore-text" onclick="readText('Ten pushups')" data-kid="kid1">Ten pushups 🔊</span>
                <br>
                <img src="https://media.giphy.com/media/mGWBjz74fn404BWUl4/giphy.gif?cid=ecf05e476pxqqc6cbon5ir86ggdqlsxc76d3ms0nhqklyspt&ep=v1_gifs_search&rid=giphy.gif&ct=g" alt="Funny Cat GIF"> X 10
            </li>            
        </ul>
    </div>
    <h1>My Chores</h1>
    <div id="chores" class="div-container">
        <ul id="checklist">
            <li class="weekday-only">
                <input type="checkbox" class="chore-checkbox" data-reveal-code="true" id="item3">
                <span class="chore-text" onclick="readText('Unpack bag')">Unpack bag 🔊</span>
            </li>
            <li class="weekday-only">
                <input type="checkbox" class="chore-checkbox" data-reveal-code="true" id="item4">
                <span class="chore-text" onclick="readText('Pack lunch')">Pack lunch 🔊</span>
            </li>
            <li class="sunday-monday">
                <input type="checkbox" class="chore-checkbox" data-reveal-code="true" id="item5">
                <span class="chore-text" onclick="readText('Laundry')">Laundry 🔊</span>
            </li>
            <li>
                <input type="checkbox" class="chore-checkbox" data-reveal-code="true" id="item6">
                <span class="chore-text" onclick="readText('Pajamas')">Pajamas 🔊</span>
            </li>
        </ul>
    </div>    
  <button onclick="speak()">Speak</button>
  <button onclick="speakFrench()">Speak French</button>

  <script>
    function speak() {
      if (typeof fully !== "undefined" && fully.textToSpeech) {
        fully.textToSpeech("Hello, this is a test message.");
      } else {
        alert("TTS not available: Are you running in Fully Kiosk Browser?");
      }
    }
    function speakFrench() {
      if (typeof fully !== "undefined" && fully.textToSpeech) {
        fully.textToSpeech("Bonjour, ceci est un message de test.", "fr-CA");
        alert("Current TTS locale: " + fully.getTtsLocale());

      } else {
        alert("TTS not available: Are you running in Fully Kiosk Browser?");
      }
    }
  </script>
    
    <h1>My Bonus Work</h1>
    <div id="bonusWork" class="div-container">
        <button class="button bonus-task video-button" data-reveal-code="true" data-json-file="../alphaBlocks.json" data-selection-mode="sequential">AlphaBlocks</button>     
        <button class="button bonus-task video-button" data-reveal-code="true" data-json-file="../caillouVideos.json" data-selection-mode="sequential">Caillou</button>    
    </div>

    <h1>My Rewards</h1>
    <div id="rewardsZone" class="div-container">
        <button id="rewardBtn" class="button" style="display:none;">Reward</button>
        <button id="overrideBtn" class="button" style="margin-left:10px;">Ask for Extra Time</button>
    </div>
    
</body>
</html>
