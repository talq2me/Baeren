    <!-- Modal Setup -->
    <div id="iframeModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000;">
        <div style="position:relative; width:90%; height:90%; margin:auto; top:5%; background:white; border-radius:10px; overflow:hidden;">
            <button onclick="closeModal()" style="position:absolute; top:10px; right:10px; font-size:24px;">✖️</button>
            <iframe id="iframeContent" src="" style="width:100%; height:100%; border:0;"></iframe>
        </div>
    </div>

    <script>
    function openModalPage(url) {
        document.getElementById('iframeContent').src = url;
        document.getElementById('iframeModal').style.display = "block";
    }
    function closeModal() {
        document.getElementById('iframeModal').style.display = "none";
    }
    </script>
