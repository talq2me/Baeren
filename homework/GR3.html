    <div id="codeDisplay" data-kid="kid2" style="font-size: 24px; margin-top: 20px; color: #333;">Progress: </div>
        <h1>Your homework:</h1>
    
    <!-- Modal Setup -->
    <div id="iframeModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000;">
        <iframe id="iframeContent" src="" style="width:100%; height:100%; border:0;"></iframe>
    </div>

    <div class="div-container">
        <button data-key="1" class="button required task-button" data-show-days="sat,sun" data-reveal-code="true" data-target-page="../mathgame/gr3math.html?jsonFile=translationFr.json&title=Translation%20Game&useAudioFiles=false&useTTS=false">Translation Game</button>
        <button data-key="2" class="button required task-button" data-show-days="sat,sun" data-reveal-code="true" data-target-page="../mathgame/gr3math.html?jsonFile=conjugationFr.json&title=Conjugation%20Game&useAudioFiles=false&useTTS=false">Conjugation Game</button>
        <button data-key="3" class="button required task-button" data-show-days="mon" data-reveal-code="true" data-target-page="../mathgame/gr3math.html?jsonFile=gr3algebra.json&title=Algebra%20Game&useAudioFiles=false&useTTS=false">Algebra Game</button>
        <button data-key="4" class="button required task-button" data-show-days="fri" data-reveal-code="true" data-target-page="../mathgame/gr3math.html?jsonFile=gr3fractions.json&title=Fractions%20Game&useAudioFiles=false&useTTS=false">Fractions Game</button>
        <button data-key="5" class="button required task-button" data-show-days="tue,thu" data-reveal-code="true" data-target-page="../mathgame/gr3math.html?jsonFile=gr3math.json&title=General%20Math%20Game&useAudioFiles=false&useTTS=false">General Math Game</button>
        <button data-key="6" class="button required task-button" data-show-days="wed,sun"data-reveal-code="true" data-target-page="../mathgame/gr3math.html?jsonFile=gr3mixedproblems.json&title=Mixed%20Math%20Game&useAudioFiles=false&useTTS=false">Mixed Math Game</button>
        <button data-key="7" class="button required task-button" data-show-days="sat" data-reveal-code="true" data-target-page="../mathgame/gr3math.html?jsonFile=gr3wordproblems.json&title=Word%20Problems%20Math%20Game&useAudioFiles=false&useTTS=false">Word Problems Math Game</button>

        <button data-key="8" class="button task-button" data-show-days="mon,tue,wed,thu,fri"  data-target-page="../dictation/dictation.html?jsonFile=english.json&lang=en-US">Spelling</button>
        <button data-key="9" class="button required task-button" data-reveal-code="true" data-target-page="../dictation/dictation.html?jsonFile=french.json&lang=fr-FR">Dictée</button>

            Google Read Along
        </button>

    <div class="div-container">

                <span class="chore-text" onclick="readText('Play Piano')">Piano 🔊</span>
            </li>
            <li data-show-days="mon,tue,thu,fri,sun">
                <input data-key="22" type="checkbox" class="chore-checkbox" data-reveal-code="true" id="item1">
                <span class="chore-text" onclick="readText('22 regular pushups, 5 knuckle pushups')" >Pushes 22 reg & 5 knuc 🔊</span>
                <br>
                <img src="https://media.giphy.com/media/mGWBjz74fn404BWUl4/giphy.gif?cid=ecf05e476pxqqc6cbon5ir86ggdqlsxc76d3ms0nhqklyspt&ep=v1_gifs_search&rid=giphy.gif&ct=g" alt="Funny Cat GIF"> 
            </li>  
             <li>
                <input data-key="23" type="checkbox" class="chore-checkbox" data-reveal-code="true" id="item4">
                <span class="chore-text" onclick="readText('English Book Report draw one chapter summary')">English Book Report <br>(draw 1 chapter <br>summary) 🔊</span>
            </li> 
        </ul>
