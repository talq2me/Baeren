    <button class="button" onclick="goBack()">&lt; Back</button>

    <div class="div-container" style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
        <button class="button weekday-only" style="width: auto; padding: 20px 40px; " onclick="location.href='../engSpelling/spelling-selfcheck.html'">

        <button class="button weekday-only" style="width: auto; padding: 20px 40px; " onclick="location.href='../engSpelling/spelling.html'">
            Spelling
        </button>
    </div>
    
    <div class="div-container">
        <button class="button tuesday-monday" onclick="location.href='../dictee/dictee.html'">Dictée</button>
    </div>
    
    <div class="div-container">
        <button class="button" onclick="location.href='../translate/translate.html'">Translate & French Reading</button>
        <button class="button day-thursday" onclick="location.href='../duological/duologicalGame.html'">Duo Game</button>

    Videos:

        <button class="button" data-video-button="Restart22">Loading...</button>
    </div>
    
    <div class="div-container">
        <button class="button" onclick="loadIframe('https://docs.google.com/presentation/d/1a4VE3VfCnnBO34KzSvvPtpfvATFrsGv6cDU8No7QXhM/edit?slide=id.g342de3a3c58_1_0#slide=id.g342de3a3c58_1_0')">Practice Presentation</button>

        <button class="button day-friday" onclick="openNewWindow('https://classroom.google.com/c/NjkwODgwNjg3NDIx')">French Google Classroom</button>

    <h1>My Chores</h1>
    <div id="chores" class="div-container">
        <ul id="checklist">
            <li class="weekday-only">

            </li>
            <li class="weekday-only">
                <input type="checkbox" id="item2">
                <span class="chore-text" onclick="readText('Pack lunch')">Pack lunch 🔊</span>
            </li>
            <li class="sunday-monday">
                <input type="checkbox" id="item3">
                <span class="chore-text" onclick="readText('Laundry')">Laundry 🔊</span>
            </li>
            <li>
                <input type="checkbox" id="item4">
                <span class="chore-text" onclick="readText('Pajamas')">Pajamas 🔊</span>

        </ul>
