<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GR3</title>
    <link rel="stylesheet" href="../styles.css">
    <script src="../videoModal.js" defer></script>
    <script src="../common.js" defer></script>
</head>
<body>
    <button class="button" onclick="goBack()">&lt; Back</button>
    <button class="button" onclick="location.href='../index.html'">⌂ Home</button>
    <h1>Welcome to Grade 3!</h1>
    Your homework:

    <div class="div-container">
        <button class="button weekday-only" onclick="location.href='../engSpelling/spelling-selfcheck.html'">Spelling - Self Check</button>
        <button class="button weekday-only" onclick="location.href='../engSpelling/spelling.html'">Spelling</button>
    </div>
    
    <div class="div-container">
        <button class="button tuesday-monday" onclick="location.href='../dictee/dictee.html'">Dictée</button>
    </div>
    
    <div class="div-container">
        <button class="button day-wednesday" onclick="location.href='../translate/translate.html'">Translate & French Reading</button>
        <button class="button day-thursday" onclick="location.href='../duological/duologicalGame.html'">Duo Game</button>
    </div>

    Videos:
    <div class="video div-container">
        <button class="button" data-video-button="StaffForm">Loading...</button>
        <button class="button" data-video-button="randIntermediateKungFuVid">Loading...</button>
    </div>
    <div class="div-container">
        <img src="https://media.giphy.com/media/mGWBjz74fn404BWUl4/giphy.gif?cid=ecf05e476pxqqc6cbon5ir86ggdqlsxc76d3ms0nhqklyspt&ep=v1_gifs_search&rid=giphy.gif&ct=g" alt="Funny Cat GIF"> X 22 reg, X 5 knuc
    </div>
    <div class="video div-container">
        <button class="button" data-video-button="TrollMarch">Loading...</button>
        <button class="button" data-video-button="Restart22">Loading...</button>
    </div>
    
    <div class="div-container">
        <!-- Iframe sites (like Google Classroom) -->
        <button class="button day-friday" onclick="openNewWindow('https://classroom.google.com/c/NjkwODgwNjg3NDIx')">French Google Classroom</button>
        <button class="button day-friday" onclick="openNewWindow('https://classroom.google.com/c/NzA5MDk2MDA2ODY3')">English Google Classroom</button>
        <button class="button sunday-tuesday" onclick="openNewWindow('https://readalong.google.com')">Google Read Along</button>
    </div>
    
    <h1>My Chores</h1>
    <div id="chores" class="div-container">
        <ul id="checklist">
            <li class="weekday-only">
                <input type="checkbox" id="item1">
                <span class="chore-text">Unpack bag</span>
                <button class="read-btn weekday-only" onclick="readText('Unpack bag')">🔊</button>
            </li>
            <li class="weekday-only">
                <input type="checkbox" id="item2">
                <span class="chore-text">Pack lunch</span>
                <button class="read-btn weekday-only" onclick="readText('Pack lunch')">🔊</button>
            </li>
            <li class="sunday-monday">
                <input type="checkbox" id="item3">
                <span class="chore-text">Laundry</span>
                <button class="read-btn sunday-monday" onclick="readText('Laundry')">🔊</button>
            </li>
            <li>
                <input type="checkbox" id="item4">
                <span class="chore-text">Pajamas</span>
                <button class="read-btn" onclick="readText('Pajamas')">🔊</button>
            </li>
        </ul>
    </div>

</body>
</html>
