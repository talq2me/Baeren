<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SK Spelling Game</title>
    
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="skSpelling.css">
</head>
<body>
    <button class="button" onclick="goBack()">&lt; Back</button>
    <button class="button" onclick="location.href='../index.html'">⌂ Home</button>
    <h1>Spell the Word!</h1>
    <div id="starCount">⭐ 0 / 10</div>
    <div id="promptContainer">
        <button id="replayBtn" class="big-button" style="display:none;">&#9654; Play</button>
    </div>
    <div id="wordBank"></div>
    <div id="spelledWord"></div>
    <button id="submitBtn" class="big-button">Submit</button>
    <button id="delete-btn" class="button" >⌫ Delete</button>
    <div id="messageContainer"></div>
    <script src="skSpelling.js"></script>
</body>
</html>
