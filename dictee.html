<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>French Word Reader</title>
    <style>
        .button-container {
            margin: 20px;
            display: flex;
            flex-direction: column; /* Stack buttons vertically */
            align-items: flex-start; /* Align buttons to the left */
        }
        button {
            width: auto;
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            text-align: left;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>French Word Reader</h1>
    <div id="buttonContainer" class="button-container"></div>

    <script>
        async function loadWords() {
            try {
                // Fetch text file
                let response = await fetch('words-fr.txt');
                let text = await response.text();

                // Split by lines while preserving full lines (even with spaces)
                let lines = text.split(/\r?\n/).map(line => line.trim()).filter(line => line !== "");

                // Get the container
                let container = document.getElementById('buttonContainer');

                // Create buttons for each full line
                lines.forEach((line, index) => {
                    let button = document.createElement('button');
                    button.textContent = line; // Button text is the full line

                    // Click event to read aloud
                    button.addEventListener('click', () => {
                        let utterance = new SpeechSynthesisUtterance(line);
                        utterance.lang = 'fr-FR'; // Read in French
                        window.speechSynthesis.speak(utterance);
                    });

                    // Add button to container
                    container.appendChild(button);
                });

            } catch (error) {
                console.error('Error loading words:', error);
                alert('Error loading words. Ensure "words-fr.txt" exists in the same folder.');
            }
        }

        // Load words on page load
        document.addEventListener('DOMContentLoaded', loadWords);
    </script>
</body>
</html>
