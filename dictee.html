<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>French Word Reader</title>
    <style>
        .button-container {
            margin: 20px;
            display: flex;
            flex-direction: column; /* Stack buttons vertically */
            align-items: flex-start; /* Align buttons to the left */
        }
        button {
            width: auto;
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            text-align: left;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>French Word Reader</h1>
    <div id="buttonContainer" class="button-container"></div>

    <script>
        // Function to fetch and process words from the text file
        async function loadWords() {
            try {
                // Fetch words from the text file
                let response = await fetch('words-fr.txt'); // Ensure words-fr.txt is in the same folder
                let text = await response.text();

                // Split text by lines (ensuring each button corresponds to one line)
                let lines = text.split(/\r?\n/).filter(line => line.trim() !== '');

                // Get the container for buttons
                let container = document.getElementById('buttonContainer');

                // Create buttons for each line
                lines.forEach((line, index) => {
                    let button = document.createElement('button');
                    button.textContent = line; // Display full line on the button

                    // Add click event to speak the full line in French
                    button.addEventListener('click', () => {
                        let utterance = new SpeechSynthesisUtterance(line);
                        utterance.lang = 'fr-FR'; // Set language to French
                        window.speechSynthesis.speak(utterance);
                    });

                    // Add button to container
                    container.appendChild(button);
                });

            } catch (error) {
                console.error('Error loading words:', error);
                alert('Error loading the words. Please make sure words-fr.txt exists in the same folder.');
            }
        }

        // Call function on page load
        document.addEventListener('DOMContentLoaded', loadWords);
    </script>
</body>
</html>
