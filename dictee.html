<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>French Word Reader</title>
    <style>
        .button-container {
            margin: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        button {
            width: auto;
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            text-align: left;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>French Word Reader</h1>
    <div id="buttonContainer" class="button-container"></div>

    <script>
        async function loadWords() {
            try {
                let response = await fetch('words-fr.txt');
                let text = await response.text();

                // Normalize new lines and ensure full lines are read
                let lines = text.split(/\r?\n/).filter(line => line.trim() !== "");

                let container = document.getElementById('buttonContainer');

                lines.forEach(line => {
                    let button = document.createElement('button');
                    button.textContent = line; // Display full line on the button

                    button.addEventListener('click', () => {
                        let utterance = new SpeechSynthesisUtterance(line);
                        utterance.lang = 'fr-FR'; // Set language to French
                        window.speechSynthesis.speak(utterance);
                    });

                    container.appendChild(button);
                });

            } catch (error) {
                console.error('Error loading words:', error);
                alert('Error loading words. Ensure "words-fr.txt" exists and is formatted correctly.');
            }
        }

        document.addEventListener('DOMContentLoaded', loadWords);
    </script>
</body>
</html>
