<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Word Reader</title>
    <style>
        .button-container {
            margin: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        button {
            width: 50px;
            height: 50px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>English Spelling</h1>
    <div id="buttonContainer" class="button-container"></div>

      <script>
        let selectedVoice;

        function setVoice() {
            const voices = window.speechSynthesis.getVoices();

            // Prioritize high-quality voices
            selectedVoice = voices.find(voice =>
                voice.name.includes('Google US English Female') // Google's best female voice
            ) || voices.find(voice =>
                voice.name.includes('Google UK English Female')
            ) || voices.find(voice =>
                voice.name.includes('Microsoft') && voice.lang.startsWith('en')
            ) || voices.find(voice =>
                voice.lang.startsWith('en') && voice.default
            ) || voices[0]; // Fallback if none found
        }

        window.speechSynthesis.onvoiceschanged = setVoice;
        setVoice(); // Initial voice selection

        async function loadWords() {
            try {
                let response = await fetch('words-en.txt');
                let text = await response.text();

                // Split text based on semicolon (;), keeping full phrases together
                let lines = text.split(';').map(line => line.trim()).filter(line => line !== "");

                let container = document.getElementById('buttonContainer');

                lines.forEach((line, index) => {
                    let button = document.createElement('button');
                    button.textContent = index + 1; // Numbered buttons

                    button.addEventListener('click', () => {
                        let utterance = new SpeechSynthesisUtterance(line);
                        utterance.voice = selectedVoice;
                        utterance.lang = 'en-US';
                        window.speechSynthesis.speak(utterance);
                    });

                    container.appendChild(button);
                });

            } catch (error) {
                console.error('Error loading words:', error);
                alert('Error loading words. Ensure "words-en.txt" exists and is formatted correctly.');
            }
        }

        document.addEventListener('DOMContentLoaded', loadWords);
    </script>
</body>
</html>
