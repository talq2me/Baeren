<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Videos from YouTube and Dropbox</title>
    <link rel="stylesheet" href="styles.css">  <!-- Link to external CSS file -->
</head>
<body>

    <div class="container">
        <h1>Embedded YouTube and Dropbox Videos</h1>

        <!-- YouTube Video Embed -->
        <div class="video">
            <h2>YouTube Video</h2>
            <iframe width="560" height="315" src="https://www.youtube.com/embed/VIDEO_ID" 
                    title="YouTube video player" frameborder="0" allowfullscreen>
            </iframe>
        </div>

        <!-- Dropbox Video Embed -->
        <div class="video">
            <h2>Dropbox Video</h2>
            <video controls>
                <source src="https://www.dropbox.com/scl/fi/lh5m8n42xesfrx8y16ftb/Cici.mp4?rlkey=m8o315twgwhq6kta4xqhaly8q&st=68qndve8&raw=1" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>

</body>
</html>
