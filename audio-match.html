<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Match Game</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/a076d05399.js"></script> <!-- Font Awesome for icons -->
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Match the Sound to the Word</h1>
            <!-- Back to Home Button -->
            <button class="back-button" onclick="window.location.href='index.html'">
                <i class="fas fa-home"></i> Back to Home
            </button>
        </div>
    </header>

    <div id="game-container">
        <button class="button" onclick="playSound()">
            <i class="fas fa-play play-icon"></i> Play Sound
        </button>
        
        <div id="choices"></div>
        <div id="stars-tracked">Stars: <span id="stars">⭐</span></div>
        <div id="feedback" class="feedback"></div>
    </div>

    <script>
        let soundData = [];
        let correctCount = 0;
        let currentSound = {};

        // Fetch the JSON file based on language selection
        function loadGameData(language) {
            fetch(language + "Data.json")
                .then(response => response.json())
                .then(data => {
                    soundData = data;
                    currentSound = getRandomSound();
                    updateChoices();
                })
                .catch(error => {
                    console.error("Error loading JSON data:", error);
                });
        }

        function getRandomSound() {
            return soundData[Math.floor(Math.random() * soundData.length)];
        }

        function playSound() {
            new Audio(currentSound.audio).play();
        }

        function handleChoice(choice) {
            const feedback = document.getElementById("feedback");
            if (choice === currentSound.word) {
                feedback.innerHTML = "⭐";
                correctCount++;
                document.getElementById("stars").innerHTML += "⭐";
                if (correctCount < 10) {
                    setTimeout(nextRound, 1000);
                } else {
                    document.getElementById("choices").innerHTML = "<h2>Game Over! 🎉</h2>";
                }
            } else {
                feedback.innerHTML = "☹️";
                highlightCorrectAnswer();
                setTimeout(() => {
                    feedback.innerHTML = "";
                    nextRound();
                }, 2000);
            }
        }

        function highlightCorrectAnswer() {
            const buttons = document.querySelectorAll(".button");
            buttons.forEach(btn => {
                if (btn.innerText === currentSound.word) {
                    btn.style.backgroundColor = "lightgreen";
                    setTimeout(() => btn.style.backgroundColor = "lightgray", 2000);
                }
            });
        }

        function nextRound() {
            currentSound = getRandomSound();
            updateChoices();
            document.getElementById("feedback").innerHTML = "";
        }

        function updateChoices() {
            const choicesDiv = document.getElementById("choices");
            choicesDiv.innerHTML = "";
            soundData.forEach(item => {
                const btn = document.createElement("button");
                btn.innerText = item.word;
                btn.className = "button";
                btn.onclick = () => handleChoice(item.word);
                choicesDiv.appendChild(btn);
            });
        }

        window.onload = () => {
            // Default to English
            loadGameData('english');
        };
    </script>
</body>
</html>
