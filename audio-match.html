<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Match Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background-color: lightgray;
            border-radius: 5px;
        }
        .button:hover {
            background-color: gray;
            color: white;
        }
        .feedback {
            font-size: 50px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Match the Sound to the Word</h1>
    <button class="button" onclick="playSound()">Play Sound</button>
    <div id="choices"></div>
    <div id="feedback" class="feedback"></div>
    
    <script>
        const soundData = [
            { word: "Cat", audio: "sounds/cat-meow.mp3" },
            { word: "Dog", audio: "sounds/dog-bark.mp3" },
            { word: "Bird", audio: "sounds/bird-chirp.mp3" },
            { word: "Cow", audio: "sounds/cow-moo.mp3" },
            { word: "Sheep", audio: "sounds/sheep-baa.mp3" }
        ];

        let currentIndex = 0;

        function playSound() {
            new Audio(soundData[currentIndex].audio).play();
        }

        function handleChoice(choice) {
            const feedback = document.getElementById("feedback");
            if (choice === soundData[currentIndex].word) {
                feedback.innerHTML = "⭐";
                setTimeout(nextSound, 1000); // Move to next sound after success
            } else {
                feedback.innerHTML = "☹️";
                setTimeout(() => feedback.innerHTML = "", 1000);
            }
        }

        function nextSound() {
            currentIndex++;
            if (currentIndex < soundData.length) {
                updateChoices();
                document.getElementById("feedback").innerHTML = "";
            } else {
                document.getElementById("choices").innerHTML = "<h2>Game Over! 🎉</h2>";
            }
        }

        function updateChoices() {
            const choicesDiv = document.getElementById("choices");
            choicesDiv.innerHTML = "";
            soundData.forEach(item => {
                const btn = document.createElement("button");
                btn.innerText = item.word;
                btn.className = "button";
                btn.onclick = () => handleChoice(item.word);
                choicesDiv.appendChild(btn);
            });
        }

        window.onload = updateChoices;
    </script>
</body>
</html>
