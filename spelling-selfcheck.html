<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Word Reader</title>
    <style>
        .container {
            margin: 10px;
            display: flex;
            align-items: center;
        }
        .buttonclass {
            width: 50px;
            height: 50px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
        }
        .buttonclass:hover {
            background-color: #0056b3;
        }
        .textinput {
            width: 120px;
            height: 30px;
            font-size: 16px;
            margin: 5px;
        }
        .submitbtn {
            width: 30px;
            height: 30px;
            font-size: 16px;
            margin: 5px;
            cursor: pointer;
            background-color: #ffcc00;
            border: none;
            border-radius: 5px;
        }
        .correct {
            color: green;
            font-size: 20px;
        }
        .incorrect {
            color: red;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <h1>English Word Reader</h1>
    <div id="buttonContainer"></div>

    <script>
        async function loadWords() {
            try {
                let response = await fetch('words-en-selfcheck.txt');
                let text = await response.text();

                let lines = text.split(';').map(line => line.trim()).filter(line => line !== "");

                let container = document.getElementById('buttonContainer');

                lines.forEach((line, index) => {
                    let parts = line.split(',');
                    if (parts.length < 2) return; // Skip invalid lines
                    
                    let wordToSpeak = parts[0].trim();
                    let correctWord = parts[1].trim();

                    let div = document.createElement('div');
                    div.classList.add('container');

                    let button = document.createElement('button');
                    button.textContent = index + 1; // Numbered buttons
                    button.classList.add('buttonclass');
                    button.addEventListener('click', () => {
                        let utterance = new SpeechSynthesisUtterance(wordToSpeak);
                        utterance.lang = 'en-US';
                        window.speechSynthesis.speak(utterance);
                    });

                    let input = document.createElement('input');
                    input.type = 'text';
                    input.classList.add('textinput');

                    let submitBtn = document.createElement('button');
                    submitBtn.textContent = '✔';
                    submitBtn.classList.add('submitbtn');
                    
                    let resultSpan = document.createElement('span');

                    submitBtn.addEventListener('click', () => {
                        if (input.value.trim().toLowerCase() === correctWord.toLowerCase()) {
                            submitBtn.replaceWith(document.createTextNode('✅'));
                            resultSpan.textContent = '';
                        } else {
                            submitBtn.replaceWith(document.createTextNode('❌'));
                            resultSpan.textContent = ` Correct: ${correctWord}`;
                            resultSpan.classList.add('incorrect');
                        }
                    });

                    div.appendChild(button);
                    div.appendChild(input);
                    div.appendChild(submitBtn);
                    div.appendChild(resultSpan);
                    container.appendChild(div);
                });

            } catch (error) {
                console.error('Error loading words:', error);
                alert('Error loading words. Ensure "words-en-selfcheck.txt" exists and is formatted correctly.');
            }
        }

        document.addEventListener('DOMContentLoaded', loadWords);
    </script>
</body>
</html>
