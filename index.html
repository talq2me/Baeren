<script>
    function awardReward(minutes) {
        if (typeof fully !== "undefined" ) {
            fully.writeFile('/storage/emulated/0/Download/reward_minutes.txt', minutes.toString());
            alert(`Awarded ${minutes} minute(s) of reward time.`);
        } else {
            alert('Fully Kiosk file access not available');
        }
    }
</script>
<button onclick="launchNetflix(5)"> Netflix </button>
<p id="status"></p>
<script>
    function launchNetflix(minutes) {
        try {
            const intentUrl = 'intent://#Intent;scheme=netflix;package=com.netflix.mediaclient;end';
            window.location.href = intentUrl;
            document.getElementById('status').innerText = 'Attempting to launch Netflix...';
        } catch (error) {
            document.getElementById('status').innerText = 'Error: ' + error.message;
            alert('Error launching Netflix: ' + error.message);
        }
    }
</script>
